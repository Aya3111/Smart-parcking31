<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeGate - Présentation de la Plateforme</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Space+Grotesk:wght@500;700&display=swap');

        :root {
            --bg-color: #050b14;
            --glass-bg: rgba(16, 24, 39, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-blue: #00f0ff;
            --accent-purple: #8a2be2;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image:
                radial-gradient(circle at 15% 50%, rgba(0, 240, 255, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(138, 43, 226, 0.15), transparent 25%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            padding: 2rem;
        }

        /* Animated Grid Background */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image:
                linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% {
                transform: perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px);
            }

            100% {
                transform: perspective(500px) rotateX(60deg) translateY(50px) translateZ(-200px);
            }
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }

        .logo-container {
            width: 90px;
            height: 90px;
            border-radius: 20px;
            background: rgba(16, 24, 39, 0.6);
            border: 1px solid var(--glass-border);
            padding: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3), 0 0 20px rgba(0, 240, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .logo-container:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4), 0 0 30px rgba(0, 240, 255, 0.3);
            border-color: var(--accent-blue);
        }

        .logo {
            max-width: 100%;
            max-height: 100%;
            border-radius: 12px;
            object-fit: contain;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 700;
            letter-spacing: -1px;
            background: linear-gradient(135deg, var(--text-main) 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.2rem;
            text-transform: uppercase;
        }

        h1 span {
            color: var(--accent-blue);
            -webkit-text-fill-color: var(--accent-blue);
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.5);
        }

        .subtitle {
            font-size: clamp(0.9rem, 2vw, 1.2rem);
            color: var(--text-muted);
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .presentation-container {
            position: relative;
            width: 100%;
            max-width: 1400px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 1.5rem;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .presentation-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 40px 80px rgba(0, 240, 255, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            aspect-ratio: 16/9;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 30px rgba(0, 240, 255, 0.15);
        }

        .video-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.3);
            pointer-events: none;
            z-index: 2;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            z-index: 1;
        }

        .controls-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }

        .system-status {
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.95rem;
            color: var(--accent-blue);
            letter-spacing: 1px;
            font-weight: 600;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background-color: var(--accent-blue);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-blue);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(0, 240, 255, 0.7);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(0, 240, 255, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(0, 240, 255, 0);
            }
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .btn.primary {
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.2), rgba(138, 43, 226, 0.2));
            border-color: var(--accent-blue);
            color: var(--accent-blue);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
        }

        .btn.primary:hover {
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.3), rgba(138, 43, 226, 0.3));
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.4);
            transform: scale(1.02);
        }

        /* UI Decorative Elements */
        .corner-bracket {
            position: absolute;
            width: 25px;
            height: 25px;
            border-color: var(--accent-blue);
            border-style: solid;
            z-index: 20;
            opacity: 0.6;
            transition: all 0.3s ease;
        }

        .presentation-container:hover .corner-bracket {
            width: 30px;
            height: 30px;
            opacity: 1;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        .tl {
            top: 20px;
            left: 20px;
            border-width: 2px 0 0 2px;
            border-top-left-radius: 8px;
        }

        .tr {
            top: 20px;
            right: 20px;
            border-width: 2px 2px 0 0;
            border-top-right-radius: 8px;
        }

        .bl {
            bottom: 20px;
            left: 20px;
            border-width: 0 0 2px 2px;
            border-bottom-left-radius: 8px;
        }

        .br {
            bottom: 20px;
            right: 20px;
            border-width: 0 2px 2px 0;
            border-bottom-right-radius: 8px;
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            .logo-container {
                width: 75px;
                height: 75px;
                border-radius: 16px;
            }

            .controls-panel {
                flex-direction: column;
                gap: 1.25rem;
                align-items: center;
                text-align: center;
                padding: 1.25rem 1rem;
            }

            .action-buttons {
                width: 100%;
                flex-direction: column;
                gap: 0.75rem;
            }

            .btn {
                width: 100%;
                justify-content: center;
                padding: 0.85rem 1.5rem;
            }

            .presentation-container {
                padding: 1rem;
                gap: 1.2rem;
                border-radius: 18px;
            }

            .corner-bracket {
                width: 15px;
                height: 15px;
            }

            .tl {
                top: 12px;
                left: 12px;
            }

            .tr {
                top: 12px;
                right: 12px;
            }

            .bl {
                bottom: 12px;
                left: 12px;
            }

            .br {
                bottom: 12px;
                right: 12px;
            }
        }
    </style>
</head>

<body>
    <div class="grid-bg"></div>

    <header>
        <div class="logo-container">
            <img src="logo safe gate.jpg" alt="SafeGate Logo" class="logo">
        </div>
        <h1>Safe<span>Gate</span></h1>
        <div class="subtitle">Présentation Officielle - Intelligence Artificielle</div>
    </header>

    <div class="presentation-container">
        <!-- Decorative Corners -->
        <div class="corner-bracket tl"></div>
        <div class="corner-bracket tr"></div>
        <div class="corner-bracket bl"></div>
        <div class="corner-bracket br"></div>

        <div class="video-wrapper">
            <video id="demoVideo" controls autoplay loop>
                <source src="VIDEO.mp4" type="video/mp4">
                Votre navigateur ne supporte pas la balise vidéo.
            </video>
        </div>

        <div class="controls-panel">
            <div class="system-status">
                <div class="status-dot"></div>
                SYSTÈME EN LIGNE | IA ACTIVE
            </div>
            <div class="action-buttons">
                <button class="btn"
                    onclick="document.getElementById('demoVideo').currentTime = 0; document.getElementById('demoVideo').play();">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                    Rejouer
                </button>
                <button class="btn primary" onclick="window.location.href='#'">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polygon points="10 8 16 12 10 16 10 8"></polygon>
                    </svg>
                    Lancer la Plateforme
                </button>
            </div>
        </div>
    </div>
</body>

</html>
